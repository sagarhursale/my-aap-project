---
- name: Linux Patching
  hosts: all
  become: yes

  tasks:
    - name: Update all packages (RHEL)
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Update all packages (Ubuntu)
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: Reboot if requested
      ansible.builtin.reboot:
      when: reboot_required == "YES"

    - name: Show completion message
      debug:
        msg: "Patching completed successfully"
