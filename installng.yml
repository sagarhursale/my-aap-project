---
- hosts: all
  become: yes

  tasks:
    - name: Install package
      package:
        name: "{{ package_name }}"
        state: present

    - name: Start service
      service:
        name: "{{ service_name }}"
        state: started
        enabled: true

    - debug:
        msg: "Installed {{ package_name }} and started {{ service_name }}"
